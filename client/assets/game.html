<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Block Coding Game</title>
  <script src="phaser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh; overflow: hidden;
      font-family: "Segoe UI", sans-serif;
      background: #1a1a2e; display: flex; flex-direction: column;
    }
    #game-container { width: 100%; flex: 1; display: flex; flex-direction: column; }
    #phaser-game { width: 100%; flex: 1; min-height: 0; }
    #ui-panel {
      background: rgba(255,255,255,0.97);
      border-top: 3px solid #b8d4f0;
      padding: 10px 20px; display: flex; flex-direction: column; gap: 8px;
    }
    #top-row { display: flex; align-items: center; justify-content: space-between; }
    #level-title { font-size: 14px; font-weight: 700; color: #2c3e50; }
    #slots-row { display: flex; align-items: center; gap: 8px; }
    #slots-container {
      flex: 1; display: flex; gap: 5px;
      background: #b8d4f0; border-radius: 10px;
      padding: 7px 10px; min-height: 50px; overflow-x: auto;
    }
    .slot {
      width: 42px; height: 42px; border: 2.5px dashed #7aaadd;
      border-radius: 8px; background: rgba(255,255,255,0.4);
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 20px; cursor: pointer; position: relative;
    }
    .slot.filled { border: 2.5px solid #4a90d9; background: white; }
    .slot.filled:hover::after {
      content: "x"; position: absolute; top: -7px; right: -7px;
      background: #e74c3c; color: white; width: 15px; height: 15px;
      border-radius: 50%; font-size: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    #run-btn {
      width: 56px; height: 56px; border-radius: 50%;
      background: radial-gradient(circle, #aaa 0%, #888 100%);
      border: 4px solid #666; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.1s; flex-shrink: 0;
    }
    #run-btn:hover { transform: scale(1.08); }
    #run-btn.running { background: radial-gradient(circle, #e74c3c 0%, #c0392b 100%); border-color: #922b21; }
    #run-btn svg { width: 26px; height: 26px; fill: white; }
    #palette-row { display: flex; gap: 12px; justify-content: center; padding: 2px 0; }
    .block-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; transition: transform 0.15s; }
    .block-btn:hover { transform: scale(1.1); }
    .block-icon {
      width: 52px; height: 52px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; box-shadow: 0 3px 8px rgba(0,0,0,0.25);
      border: 3px solid rgba(0,0,0,0.15);
    }
    .block-label { font-size: 10px; font-weight: 700; color: #555; text-align: center; }
    #status-bar { text-align: center; font-size: 13px; font-weight: 700; color: #555; min-height: 16px; }
    #status-bar.win { color: #27ae60; }
    #status-bar.fail { color: #e74c3c; }
    #reset-btn {
      background: #ecf0f1; border: 2px solid #bdc3c7; border-radius: 8px;
      padding: 4px 12px; font-size: 12px; font-weight: 700; color: #7f8c8d; cursor: pointer;
    }
    #reset-btn:hover { background: #dfe6e9; }
    #side-btns {
      position: fixed; left: 12px; bottom: 120px;
      display: flex; flex-direction: column; gap: 8px; z-index: 100;
    }
    .side-btn {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
  </style>
</head>

<div id="side-btns">
  <div class="side-btn" style="background:#3498db;" onclick="showInfo()">i</div>
  <div class="side-btn" style="background:#f39c12;" id="sound-btn" onclick="toggleSound()">S</div>
</div>

<div id="game-container">
  <div id="phaser-game"></div>
  <div id="ui-panel">
    <div id="top-row">
      <div id="level-title">Level 1 - Move the character to the flag!</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div id="status-bar"></div>
        <button id="reset-btn" onclick="resetLevel()">Reset</button>
      </div>
    </div>
    <div id="slots-row">
      <div id="slots-container"></div>
      <div id="run-btn" onclick="runCommands()">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
    </div>
    <div id="palette-row">
      <div class="block-btn" onclick="addCommand('move_right')">
        <div class="block-icon" style="background:linear-gradient(135deg,#3498db,#2980b9);">&#10145;</div>
        <div class="block-label">Move Right</div>
      </div>
      <div class="block-btn" onclick="addCommand('move_left')">
        <div class="block-icon" style="background:linear-gradient(135deg,#9b59b6,#8e44ad);">&#11013;</div>
        <div class="block-label">Move Left</div>
      </div>
      <div class="block-btn" onclick="addCommand('jump')">
        <div class="block-icon" style="background:linear-gradient(135deg,#27ae60,#229954);">&#11014;</div>
        <div class="block-label">Jump</div>
      </div>
      <div class="block-btn" onclick="addCommand('move_right');addCommand('move_right');">
        <div class="block-icon" style="background:linear-gradient(135deg,#e67e22,#d35400);">&#128257;</div>
        <div class="block-label">Repeat x2</div>
      </div>
    </div>
  </div>
</div>

<script>
const TILE = 48;
const COLS = 19;
const ROWS = 7;
const W = COLS * TILE;
const H = ROWS * TILE;

let commands = [];
let isRunning = false;
let soundOn = true;
let phaserScene = null;

const level = {
  charStart: { x: 2, y: 3 },
  goal: { x: 16, y: 3 },
  platforms: [
    ...[...Array(19)].map((_, i) => ({ x: i, y: 4, type: 'grass' })),
    ...[...Array(19)].map((_, i) => ({ x: i, y: 6, type: 'dirt' })),
  ],
  decorations: [
    { type: 'spikes', x: 5, y: 3 },
    { type: 'spikes', x: 9, y: 3 },
    { type: 'spikes', x: 13, y: 3 },
    { type: 'grass_deco', x: 0, y: 3 },
    { type: 'grass_deco', x: 3, y: 3 },
    { type: 'grass_deco', x: 7, y: 3 },
    { type: 'grass_deco', x: 11, y: 3 },
    { type: 'grass_deco', x: 18, y: 3 },
  ],
};

class GameScene extends Phaser.Scene {
  constructor() { super("GameScene"); }
  preload() {}

  create() {
    phaserScene = this;
    this.charX = level.charStart.x;
    this.charY = level.charStart.y;
    this.flagFrame = 0;

    this.textures.addImage("flag_green_b", document.getElementById("img_flag_green_b"));
    this.textures.addImage("terrain_grass_block", document.getElementById("img_terrain_grass_block"));
    this.textures.addImage("background_color_hills", document.getElementById("img_background_color_hills"));
    this.textures.addImage("grass", document.getElementById("img_grass"));
    this.textures.addImage("terrain_grass_block_top", document.getElementById("img_terrain_grass_block_top"));
    this.textures.addImage("terrain_grass_block_right", document.getElementById("img_terrain_grass_block_right"));
    this.textures.addImage("coin_gold", document.getElementById("img_coin_gold"));
    this.textures.addImage("background_color_trees", document.getElementById("img_background_color_trees"));
    this.textures.addImage("block_spikes", document.getElementById("img_block_spikes"));
    this.textures.addImage("character_beige_jump", document.getElementById("img_character_beige_jump"));
    this.textures.addImage("terrain_grass_block_center", document.getElementById("img_terrain_grass_block_center"));
    this.textures.addImage("character_beige_walk_a", document.getElementById("img_character_beige_walk_a"));
    this.textures.addImage("character_beige_walk_b", document.getElementById("img_character_beige_walk_b"));
    this.textures.addImage("flag_green_a", document.getElementById("img_flag_green_a"));
    this.textures.addImage("character_beige_idle", document.getElementById("img_character_beige_idle"));
    this.textures.addImage("terrain_grass_block_left", document.getElementById("img_terrain_grass_block_left"));
    this.textures.addImage("terrain_dirt_block_center", document.getElementById("img_terrain_dirt_block_center"));
    this.textures.addImage("terrain_dirt_block", document.getElementById("img_terrain_dirt_block"));

    this._drawBackground();
    this._drawPlatforms();
    this._drawDecorations();
    this._drawGoal();
    this._createCharacter();
    this._drawWater();

    this.time.addEvent({
      delay: 400, loop: true,
      callback: () => {
        this.flagFrame = (this.flagFrame + 1) % 2;
        if (this.flagSprite)
          this.flagSprite.setTexture(this.flagFrame === 0 ? 'flag_green_a' : 'flag_green_b');
      }
    });
  }

  _drawBackground() {
    const sky = this.add.graphics();
    for (let i = 0; i < H; i++) {
      const t = i / H;
      const r = Math.floor(Phaser.Math.Linear(135, 190, t));
      const g = Math.floor(Phaser.Math.Linear(206, 228, t));
      const b = Math.floor(Phaser.Math.Linear(235, 245, t));
      sky.fillStyle(Phaser.Display.Color.GetColor(r, g, b), 1);
      sky.fillRect(0, i, W, 1);
    }
    const bgH = this.add.image(W/2, H*0.5, 'background_color_hills');
    bgH.setDisplaySize(W, H*0.75); bgH.setAlpha(0.85);
    const bgT = this.add.image(W/2, H*0.52, 'background_color_trees');
    bgT.setDisplaySize(W, H*0.7); bgT.setAlpha(0.55);

    const sun = this.add.graphics();
    sun.fillStyle(0xFFD700);
    sun.fillCircle(W-70, 42, 35);
    sun.lineStyle(3, 0xFFD700);
    for (let i = 0; i < 12; i++) {
      const a = (i/12)*Math.PI*2;
      sun.beginPath();
      sun.moveTo(W-70+Math.cos(a)*42, 42+Math.sin(a)*42);
      sun.lineTo(W-70+Math.cos(a)*56, 42+Math.sin(a)*56);
      sun.strokePath();
    }
    sun.fillStyle(0x7A5000);
    sun.fillCircle(W-82, 37, 4); sun.fillCircle(W-58, 37, 4);
    sun.lineStyle(2.5, 0x7A5000);
    sun.beginPath(); sun.arc(W-70, 46, 12, 0, Math.PI); sun.strokePath();
    this._cloud(100, 28, 1.0); this._cloud(420, 20, 0.7); this._cloud(680, 32, 0.8);
  }

  _cloud(cx, cy, s) {
    const g = this.add.graphics();
    g.fillStyle(0xFFFFFF, 0.88);
    const r = s * 26;
    g.fillCircle(cx, cy, r*0.8);
    g.fillCircle(cx-r, cy+r*0.3, r*0.6);
    g.fillCircle(cx+r, cy+r*0.3, r*0.6);
    g.fillCircle(cx-r*0.4, cy+r*0.5, r*0.55);
    g.fillCircle(cx+r*0.4, cy+r*0.5, r*0.55);
  }

  _drawPlatforms() {
    level.platforms.forEach((p) => {
      const px = p.x * TILE + TILE/2;
      const py = p.y * TILE + TILE/2;
      const isGrass = p.type === 'grass';
      let key;
      if (isGrass) {
        if (p.x === 0) key = 'terrain_grass_block_left';
        else if (p.x === 18) key = 'terrain_grass_block_right';
        else key = 'terrain_grass_block';
      } else {
        key = p.x % 2 === 0 ? 'terrain_dirt_block' : 'terrain_dirt_block_center';
      }
      const img = this.add.image(px, py, key);
      img.setDisplaySize(TILE, TILE);
    });
  }

  _drawWater() {
    const g = this.add.graphics();
    g.fillStyle(0x3a8fbf, 0.5);
    g.fillRect(0, 5 * TILE, W, TILE);
    g.lineStyle(2, 0x5aafd4, 0.6);
    for (let wx = 0; wx < W; wx += 50) {
      g.beginPath();
      g.moveTo(wx, 5*TILE+10); g.lineTo(wx+12, 5*TILE+5);
      g.lineTo(wx+25, 5*TILE+10); g.lineTo(wx+37, 5*TILE+16);
      g.lineTo(wx+50, 5*TILE+10); g.strokePath();
    }
  }

  _drawDecorations() {
    level.decorations.forEach(d => {
      const px = d.x * TILE + TILE/2;
      const py = d.y * TILE + TILE/2;
      if (d.type === 'spikes') {
        const img = this.add.image(px, py + 10, 'block_spikes');
        img.setDisplaySize(TILE, TILE*0.6);
      } else if (d.type === 'grass_deco') {
        const img = this.add.image(px, py + 14, 'grass');
        img.setDisplaySize(TILE*0.7, TILE*0.5);
      }
    });
  }

  _drawGoal() {
    const px = level.goal.x * TILE + TILE/2;
    const py = level.goal.y * TILE + TILE/2;
    const pole = this.add.graphics();
    pole.fillStyle(0x666666);
    pole.fillRect(px - 2, py - 20, 4, 44);
    this.flagSprite = this.add.image(px + 14, py - 12, 'flag_green_a');
    this.flagSprite.setDisplaySize(32, 24);
    const glow = this.add.graphics();
    glow.fillStyle(0xFFD700, 0.3);
    glow.fillCircle(px, py + 20, 16);
    this.tweens.add({ targets: glow, alpha: 0.1, duration: 700, yoyo: true, repeat: -1 });
  }

  _createCharacter() {
    this.charSprite = this.add.image(
      this.charX * TILE + TILE/2,
      this.charY * TILE + TILE/2,
      'character_beige_idle'
    );
    this.charSprite.setDisplaySize(TILE*0.85, TILE*1.1);
  }

  async moveLinus(cmd) {
    return new Promise(resolve => {
      let targetX = this.charX;
      if (cmd === 'move_right') { targetX++; this.charSprite.setFlipX(false); }
      else if (cmd === 'move_left') { targetX--; this.charSprite.setFlipX(true); }
      else if (cmd === 'jump') {
        this.charSprite.setTexture('character_beige_jump');
        this.tweens.add({
          targets: this.charSprite, y: this.charSprite.y - 80,
          duration: 260, ease: 'Sine.easeOut', yoyo: true,
          onComplete: () => { this.charSprite.setTexture('character_beige_idle'); resolve(false); }
        });
        return;
      }
      if (targetX < 0 || targetX >= COLS) { this._shake(); resolve(true); return; }
      const targetPx = targetX * TILE + TILE/2;
      this.tweens.add({
        targets: this.charSprite, x: targetPx, duration: 200, ease: 'Linear',
        onUpdate: (tween) => {
          const t = tween.progress;
          this.charSprite.y = (this.charY * TILE + TILE/2) - Math.sin(t * Math.PI) * 12;
          this.charSprite.setTexture(t < 0.5 ? 'character_beige_walk_a' : 'character_beige_walk_b');
        },
        onComplete: () => {
          this.charX = targetX;
          this.charSprite.x = targetPx;
          this.charSprite.y = this.charY * TILE + TILE/2;
          this.charSprite.setTexture('character_beige_idle');
          if (this.charX === level.goal.x && this.charY === level.goal.y) resolve('win');
          else resolve(false);
        }
      });
    });
  }

  _shake() {
    const orig = this.charSprite.x;
    this.tweens.add({
      targets: this.charSprite, x: orig + 10,
      duration: 50, yoyo: true, repeat: 4,
      onComplete: () => { this.charSprite.x = orig; }
    });
  }

  resetLinus() {
    this.charX = level.charStart.x;
    this.charY = level.charStart.y;
    this.charSprite.x = this.charX * TILE + TILE/2;
    this.charSprite.y = this.charY * TILE + TILE/2;
    this.charSprite.setFlipX(false);
    this.charSprite.setTexture('character_beige_idle');
  }
}

const config = {
  type: Phaser.AUTO,
  backgroundColor: '#87ceeb',
  parent: 'phaser-game',
  scene: GameScene,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: W, height: H,
  },
};
const game = new Phaser.Game(config);

const MAX_SLOTS = 12;
function renderSlots() {
  const container = document.getElementById('slots-container');
  container.innerHTML = '';
  for (let i = 0; i < MAX_SLOTS; i++) {
    const slot = document.createElement('div');
    slot.className = 'slot' + (commands[i] ? ' filled' : '');
    if (commands[i]) {
      const map = { move_right: '&#10145;', move_left: '&#11013;', jump: '&#11014;' };
      slot.innerHTML = `<span style="font-size:20px">${map[commands[i]] || '?'}</span>`;
      slot.onclick = () => removeCommand(i);
    }
    container.appendChild(slot);
  }
}
function addCommand(cmd) {
  if (isRunning || commands.length >= MAX_SLOTS) return;
  commands.push(cmd); renderSlots();
}
function removeCommand(i) {
  if (isRunning) return; commands.splice(i, 1); renderSlots();
}
async function runCommands() {
  if (isRunning || commands.length === 0) return;
  isRunning = true;
  const btn = document.getElementById('run-btn');
  btn.classList.add('running');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  setStatus('', '');
  phaserScene.resetLinus();
  for (const cmd of commands) {
    await delay(80);
    const result = await phaserScene.moveLinus(cmd);
    if (result === 'win') {
      setStatus('Level Complete! Amazing!', 'win');
      celebrateWin();
      if (window.GameChannel) GameChannel.postMessage('levelComplete');
      break;
    } else if (result === true) {
      setStatus('Oops! Out of bounds!', 'fail'); break;
    }
  }
  isRunning = false;
  btn.classList.remove('running');
  btn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';
}
function celebrateWin() {
  const scene = phaserScene;
  const flash = scene.add.rectangle(W/2, H/2, W, H, 0xFFFFFF, 0);
  scene.tweens.add({ targets: flash, alpha: 0.5, duration: 150, yoyo: true, repeat: 2, onComplete: () => flash.destroy() });
  for (let i = 0; i < 25; i++) {
    setTimeout(() => {
      const colors = [0xFF6B6B, 0xFFD93D, 0x6BCB77, 0x4D96FF, 0xFF922B, 0xC77DFF];
      const conf = scene.add.rectangle(Phaser.Math.Between(50, W-50), -10, 10, 10, colors[Phaser.Math.Between(0, 5)]);
      scene.tweens.add({
        targets: conf, y: H+20, x: conf.x + Phaser.Math.Between(-80, 80),
        rotation: Phaser.Math.Between(0, 15), duration: Phaser.Math.Between(1000, 2200),
        onComplete: () => conf.destroy()
      });
    }, i * 60);
  }
}
function resetLevel() {
  if (isRunning) return;
  commands = []; renderSlots(); setStatus('', '');
  if (phaserScene) phaserScene.resetLinus();
}
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function setStatus(msg, type) {
  const bar = document.getElementById('status-bar');
  bar.textContent = msg; bar.className = type || '';
}
function showInfo() { alert('Move the character to the green flag!\nUse the blocks to build your program.'); }
function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('sound-btn').textContent = soundOn ? 'S' : 'M';
}
renderSlots();
</script>
